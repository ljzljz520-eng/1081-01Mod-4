<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Trajectory Galaxy | 人生轨迹银河</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@300;500;700&display=swap');

        :root {
            --matte-green: #354A3D;
            /* 哑光绿 - Deep Forest Green */
            --metallic-gold: #C5A059;
            /* 金属金 */
            --galaxy-dark: #05070A;
            --text-light: #E0E0E0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--galaxy-dark);
            color: var(--text-light);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* Let clicks pass to 3D scene */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-block h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--metallic-gold);
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.5);
            letter-spacing: 2px;
            pointer-events: auto;
        }

        .title-block p {
            font-size: 0.9rem;
            color: #8fa3ad;
            margin-top: 0.5rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            pointer-events: auto;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--metallic-gold);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(197, 160, 89, 0.2);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            border-color: var(--metallic-gold);
        }

        .status-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            max-width: 300px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .interaction-guide {
            text-align: right;
            pointer-events: auto;
        }

        .interaction-guide .key {
            display: inline-block;
            color: var(--metallic-gold);
            font-weight: bold;
            margin-right: 0.5rem;
        }

        /* Modal */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(53, 74, 61, 0.9), rgba(5, 7, 10, 0.95));
            border: 1px solid var(--metallic-gold);
            padding: 3rem;
            border-radius: 2px;
            width: 500px;
            max-width: 90%;
            position: relative;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.2);
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: var(--text-light);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: var(--metallic-gold);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--metallic-gold);
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group input[type="file"],
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            color: white;
            font-family: inherit;
            border-radius: 4px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--metallic-gold);
        }

        .submit-btn {
            width: 100%;
            background: var(--metallic-gold);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #e6c67a;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.5);
        }

        /* Video element for MediaPipe (Hidden) */
        .input_video {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 240px;
            z-index: 5;
            opacity: 0.5;
            /* Debugging: set to 0.5 to see camera */
        }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.5s;
        }

        .loader.hidden {
            opacity: 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            border-top-color: var(--metallic-gold);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Feature Card (Shows when clicking an event) */
        .event-card {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 25, 30, 0.9);
            border: 1px solid var(--metallic-gold);
            padding: 1rem;
            width: 300px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .event-card.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .event-media {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 0.8rem;
            background: #111;
        }

        .event-title {
            color: var(--metallic-gold);
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .event-date {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .event-desc {
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Artifact Selector */
        .artifact-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .artifact-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            padding: 0.8rem 0.3rem;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 80px;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .artifact-option:hover,
        .artifact-option.selected {
            border-color: var(--metallic-gold);
            background: rgba(197, 160, 89, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
        }

        .artifact-option.selected::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 6px;
            color: var(--metallic-gold);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .artifact-option {
            position: relative;
        }

        .artifact-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .artifact-option span {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        /* Artifact Detail Modal */
        .artifact-detail-content {
            max-width: 440px;
            padding: 2rem;
        }

        .artifact-detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .artifact-detail-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .artifact-detail-type {
            color: var(--metallic-gold);
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            margin: 0 0 0.2rem 0;
        }

        .artifact-detail-linked {
            font-size: 0.8rem;
            color: #888;
            margin: 0;
        }

        .artifact-detail-body {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .artifact-detail-photo {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 8px;
            background: #111;
            border: 1px solid var(--glass-border);
        }

        .artifact-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            border-left: 2px solid var(--metallic-gold);
        }

        .artifact-section-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--metallic-gold);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .artifact-section-content {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .ui-layer {
                padding: 1rem;
            }

            .title-block h1 {
                font-size: 1.3rem;
            }

            .controls .btn {
                padding: 0.6rem 1rem;
                font-size: 0.7rem;
            }

            .artifact-selector {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .artifact-option {
                min-height: 72px;
                padding: 0.7rem 0.2rem;
            }

            .artifact-icon {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }

            .artifact-option span {
                font-size: 0.7rem;
            }

            .modal-content {
                padding: 1.5rem;
                margin: 1rem;
                max-height: 85vh;
                overflow-y: auto;
            }

            .artifact-detail-content {
                padding: 1.5rem;
            }

            .artifact-detail-header {
                flex-direction: column;
                text-align: center;
            }

            .artifact-detail-type {
                font-size: 1.2rem;
            }

            .status-panel {
                max-width: 200px;
                padding: 0.7rem;
            }

            .event-card {
                width: calc(100% - 2rem);
                bottom: 1rem;
                left: 1rem;
                right: 1rem;
                transform: translateY(20px) translateX(0);
            }

            .event-card.active {
                transform: translateY(0) translateX(0);
            }

            .interaction-guide p {
                font-size: 0.7rem;
                line-height: 1.5;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }

            .artifact-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    <!-- Import Maps for Three.js ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script>
        // ... (imports remain)
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

    <div id="canvas-container"></div>
    <!-- Added autoplay and playsinline to prevent playback errors -->
    <video class="input_video" autoplay playsinline muted></video>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>初始化银河引擎...<br><span id="loader-text" style="font-size: 0.8rem; color: #888;">请允许摄像头权限以开启手势交互</span></p>
    </div>

    <div class="ui-layer">
        <div class="header">
            <div class="title-block">
                <h1>LIFEALAXY</h1>
                <p>人生轨迹银河 · 你的专属时空</p>
            </div>
            <div class="controls">
                <button class="btn" id="add-event-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    添加记忆节点
                </button>
            </div>
        </div>

        <div class="footer">
            <div class="status-panel">
                <div class="status-item">
                    <div
                        style="width: 8px; height: 8px; background: var(--metallic-gold); border-radius: 50%; box-shadow: 0 0 5px var(--metallic-gold);">
                    </div>
                    <span id="system-status">系统就绪</span>
                </div>
                <div class="status-item">
                    <span id="hand-status" style="color: #888;">等待手势识别...</span>
                </div>
            </div>
            <div class="interaction-guide">
                <p><span class="key">张开手掌</span> 流动 · <span class="key">握拳</span> 静止 · <span class="key">捏合</span> 操控
                </p>
            </div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h2 style="color: var(--metallic-gold); margin-bottom: 1.5rem; font-family: 'Cinzel';">铸造星辰</h2>
            <form id="event-form">
                <div class="form-group">
                    <label>事件名称</label>
                    <input type="text" id="event-title" placeholder="例如：由你命名的瞬间" required>
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="event-date" required>
                </div>
                <div class="form-group">
                    <label>影像 (图片/视频 &lt; 30s)</label>
                    <input type="file" id="event-file" accept="image/*,video/*" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="event-desc" rows="3" placeholder="这一刻发生了什么..."></textarea>
                </div>

                <div class="form-group" style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                        </svg>
                        绑定重要物件（可选）
                    </label>
                    <p style="font-size: 0.75rem; color: #888; margin-bottom: 1rem;">选择一件承载这段记忆的实体物件</p>

                    <div class="artifact-selector" id="artifact-selector">
                        <div class="artifact-option" data-type="diploma">
                            <div class="artifact-icon" style="background: linear-gradient(135deg, #C5A059, #8B7332);">🎓</div>
                            <span>毕业证</span>
                        </div>
                        <div class="artifact-option" data-type="ticket">
                            <div class="artifact-icon" style="background: linear-gradient(135deg, #D2691E, #8B4513);">🎫</div>
                            <span>老车票</span>
                        </div>
                        <div class="artifact-option" data-type="key">
                            <div class="artifact-icon" style="background: linear-gradient(135deg, #B8860B, #6B5300);">🔑</div>
                            <span>钥匙</span>
                        </div>
                        <div class="artifact-option" data-type="letter">
                            <div class="artifact-icon" style="background: linear-gradient(135deg, #F5F5DC, #A0926D); color: #333;">✉️</div>
                            <span>手写信</span>
                        </div>
                    </div>
                    <input type="hidden" id="selected-artifact-type" value="">

                    <div id="artifact-detail-fields" style="display: none; margin-top: 1.2rem; padding: 1rem; background: rgba(0,0,0,0.3); border-radius: 6px;">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>物件照片</label>
                            <input type="file" id="artifact-photo" accept="image/*">
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>物件背后的故事</label>
                            <textarea id="artifact-story" rows="2" placeholder="关于这件物件，你记得什么..."></textarea>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>保存地点</label>
                            <input type="text" id="artifact-location" placeholder="例如：书桌抽屉第二层 / 老家衣柜顶层">
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">注入银河</button>
            </form>
        </div>
    </div>

    <!-- Artifact Detail Modal -->
    <div class="modal artifact-modal" id="artifact-modal">
        <div class="modal-content artifact-detail-content">
            <span class="close-modal" id="close-artifact-modal">&times;</span>
            <div class="artifact-detail-header">
                <div class="artifact-detail-icon" id="artifact-detail-icon">🎓</div>
                <div>
                    <h2 class="artifact-detail-type" id="artifact-detail-type">毕业证</h2>
                    <p class="artifact-detail-linked" id="artifact-detail-linked">关联记忆：毕业那天</p>
                </div>
            </div>
            <div class="artifact-detail-body">
                <img class="artifact-detail-photo" id="artifact-detail-photo" style="display: none;">
                <div class="artifact-section">
                    <div class="artifact-section-label">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                        </svg>
                        故事
                    </div>
                    <p class="artifact-section-content" id="artifact-detail-story">—</p>
                </div>
                <div class="artifact-section">
                    <div class="artifact-section-label">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        保存地点
                    </div>
                    <p class="artifact-section-content" id="artifact-detail-location">—</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Detail Card -->
    <div class="event-card" id="event-card">
        <img class="event-media" id="card-img" style="display:none;">
        <video class="event-media" id="card-video" controls loop style="display:none;"></video>
        <h3 class="event-title" id="card-title">Event Title</h3>
        <p class="event-date" id="card-date">2023.01.01</p>
        <p class="event-desc" id="card-desc">Event description goes here.</p>
        <div class="event-artifacts" id="card-artifacts" style="display: none; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--glass-border);">
            <div style="font-size: 0.8rem; color: var(--metallic-gold); margin-bottom: 0.5rem;">📦 绑定的重要物件</div>
            <div id="card-artifact-list" style="display: flex; gap: 0.5rem; flex-wrap: wrap;"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration & State ---
        const CONFIG = {
            particleCount: 2000,
            galaxyRadius: 50,
            spiralArms: 3,
            armSpread: 0.5,
            particleSize: 0.3,
            colors: {
                inside: new THREE.Color('#D4AF37'), // Gold
                outside: new THREE.Color('#354A3D') // Matte Green
            }
        };

        const ARTIFACT_TYPES = {
            diploma: {
                name: '毕业证',
                emoji: '🎓',
                color: 0xC5A059,

        // --- GALAXY GENERATION ---
        let geometry = null;

        function generateGalaxy() {
            if (points !== null) {
                geometry.dispose();
                material.dispose();
                scene.remove(points);
            }

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.particleCount * 3);
            const colors = new Float32Array(CONFIG.particleCount * 3);
            const sizes = new Float32Array(CONFIG.particleCount);
            const randomness = new Float32Array(CONFIG.particleCount * 3); // For movement

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const i3 = i * 3;

                // Spiral logic
                const radius = Math.random() * CONFIG.galaxyRadius;
                const spinAngle = radius * CONFIG.spiralArms;
                const branchAngle = (i % CONFIG.spiralArms) / CONFIG.spiralArms * Math.PI * 2;

                const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * CONFIG.armSpread * radius;
                const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * CONFIG.armSpread * radius;
                const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * CONFIG.armSpread * radius;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY * 2; // Flat galaxy, bit of height
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                // Color mixing
                const mixedColor = CONFIG.colors.inside.clone();
                mixedColor.lerp(CONFIG.colors.outside, radius / CONFIG.galaxyRadius);

                // Add some "Galaxy" blues/purples randomly
                if (Math.random() > 0.8) {
                    mixedColor.offsetHSL(0.5, 0, 0); // Shift to blue/purple
                }

                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;

                // Size variation
                sizes[i] = Math.random() * 2.0 + 0.5; // Increased from 0.5 and 0.1 for visibility

                // Store randomness for animation
                randomness[i3] = randomX;
                randomness[i3 + 1] = randomY;
                randomness[i3 + 2] = randomZ;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandomness', new THREE.BufferAttribute(randomness, 3));

            // Custom Shader Material for glowing particles
            material = new THREE.ShaderMaterial({
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                uniforms: {
                    uTime: { value: 0 },
                    uSize: { value: 70 * renderer.getPixelRatio() }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform float uSize;
                    attribute float size;
                    attribute vec3 aRandomness;
                    varying vec3 vColor;
                    
                    void main() {
                        vec3 pos = position;
                        
                        // Subtle breathing effect
                        float slowTime = uTime * 0.5;
                        pos.x += cos(slowTime + aRandomness.x * 10.0) * 0.1;
                        pos.z += sin(slowTime + aRandomness.z * 10.0) * 0.1;
                        pos.y += sin(slowTime + aRandomness.y * 10.0) * 0.1;

                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = uSize * size * (1.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                        vColor = color;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // Circular particle
                        float strength = distance(gl_PointCoord, vec2(0.5));
                        strength = 1.0 - strength;
                        strength = pow(strength, 3.0);
                        
                        vec3 finalColor = mix(vec3(0.0), vColor, strength);
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function createArtifactMesh(type) {

            group.add(coreMesh);

            const hitBox = new THREE.Mesh(hitGeo, hitMat);

        function addArtifactsToEvent(star, eventData, artifacts) {
            if (!artifacts || artifacts.length === 0) return;

            const starPos = star.position.clone();
            const count = artifacts.length;

            artifacts.forEach((artifactData, index) => {
                const mesh = createArtifactMesh(artifactData.type);
                if (!mesh) return;

                const angleOffset = (index / count) * Math.PI * 2;
                mesh.userData.orbitAngle = angleOffset;
                mesh.userData.starRef = star;
                mesh.userData.artifactData = artifactData;
                mesh.userData.eventData = eventData;

                mesh.position.copy(starPos);

                mesh.userData.hitTarget = mesh.children[0].children[mesh.children[0].children.length - 1];

                artifactGroup.add(mesh);
                STATE.artifacts.push(mesh);
            });
        }

        function addLifeEventToGalaxy(data, dominatColor, artifacts) {
            const count = STATE.events.length;
            const radius = 10 + (count * 5);
            const angle = count * 0.5;

            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 5;

            const starGeo = new THREE.SphereGeometry(2.5, 32, 32);
            const starMat = new THREE.MeshBasicMaterial({
                color: dominatColor || 0xFFFFFF,
                toneMapped: false
            });
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set(x, y, z);

            const ringGeo = new THREE.RingGeometry(3.0, 3.2, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: dominatColor || 0xFFFFFF,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.6,
                toneMapped: false
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.lookAt(0, 0, 0);
            star.add(ring);

            const light = new THREE.PointLight(dominatColor || 0xFFFFFF, 5, 40);
            light.position.set(x, y, z);
            scene.add(light);

            star.userData = { isEvent: true, data: data, ring: ring, light: light };
            eventGroup.add(star);

            if (artifacts && artifacts.length > 0) {
                addArtifactsToEvent(star, data, artifacts);
            }

            return star;
        }

        // Raycasting for interactions
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function handlePointerEvent(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const allArtifacts = [];
            artifactGroup.traverse(obj => {
                if (obj.isMesh) allArtifacts.push(obj);
            });

            const artifactIntersects = raycaster.intersectObjects(allArtifacts, false);
            for (let hit of artifactIntersects) {
                let node = hit.object;
                while (node && !node.userData?.isArtifact) {
                    node = node.parent;
                }
                if (node && node.userData?.isArtifact) {
                    const showFn = window.showArtifactModal || showArtifactModal;
                    if (showFn) showFn(node.userData.artifactData, node.userData.eventData);
                    pulseArtifact(node);
                    return;
                }
            }

            const eventIntersects = raycaster.intersectObjects(eventGroup.children, true);
            if (eventIntersects.length > 0) {
                let node = eventIntersects[0].object;
                while (node && !node.userData?.isEvent) {
                    node = node.parent;
                }
                if (node && node.userData?.isEvent) {
                    showEventCard(node.userData.data);
                    return;

        // --- MEDIAPIPE HANDS SETUP ---

        function onResults(results) {
            if (loader && !loader.classList.contains('hidden')) {
                loader.classList.add('hidden');
                systemStatus.innerText = "视觉核心已启动";
                systemStatus.style.color = "#4CAF50";

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                STATE.handPresent = true;
                handStatus.innerText = "手势操控中";
                handStatus.style.color = "#C5A059";

                const landmarks = results.multiHandLandmarks[0];

                // Detect simple gestures
                // 1. Is fist? Check if finger tips are below finger pip (proximal interphalangeal)
                const isFist = landmarks[8].y > landmarks[6].y &&
                    landmarks[12].y > landmarks[10].y &&
                    landmarks[16].y > landmarks[14].y;

                // 2. Open palm
                const isOpen = !isFist;

                // 3. Pinch (Thumb tip close to Index tip)
                const dx = landmarks[4].x - landmarks[8].x;
                const dy = landmarks[4].y - landmarks[8].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const isPinch = dist < 0.05;

                // Apply Logic
                if (isPinch) {
                    // Zoom/Manipulate mode
                    // Map hand x/y to camera position or rotation
                    const handX = landmarks[9].x - 0.5;
                    const handY = landmarks[9].y - 0.5;
                    points.rotation.x = handY * 2;
                    points.rotation.z = -handX * 2;
                } else if (isFist) {
                    // Stop
                    STATE.targetSpeed = 0;
                    controls.autoRotate = false;
                } else {
                    // Flow (Open Hand)
                    STATE.targetSpeed = 1.0;
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 2.0;
                }

            } else {
                STATE.handPresent = false;
                handStatus.innerText = "等待手势...";
                handStatus.style.color = "#888";

                // Reset to default idle
                STATE.targetSpeed = 0.2;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.5;
                // Smoothly return rotation to 0
                points.rotation.x *= 0.95;
                points.rotation.z *= 0.95;
            }
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Update Shader uniforms
            material.uniforms.uTime.value = elapsedTime;

            // Interpolate speed
            STATE.speed += (STATE.targetSpeed - STATE.speed) * 0.05;

            // Rotate galaxy container if needed (besides orbit controls)
            // But OrbitControls handles camera. 
            // We can rotate the points mesh for "Flow"
            points.rotation.y += STATE.speed * 0.005;

            // Animate Events
            eventGroup.children.forEach(star => {
                const scale = 1 + Math.sin(elapsedTime * 2.0) * 0.1;
                star.scale.set(scale, scale, scale);
                if (star.userData.ring) {
                    star.userData.ring.rotation.z += 0.01;
                    star.userData.ring.rotation.x += 0.01;
                }
            });

            // Animate Artifacts (orbit, pulse, rotation)
            STATE.artifacts.forEach(artifact => {
                const uData = artifact.userData;
                const starRef = uData.starRef;

                if (starRef) {
                    uData.orbitAngle += uData.orbitSpeed * STATE.speed * 0.008;

                    const orbitX = Math.cos(uData.orbitAngle) * uData.orbitRadius;
                    const orbitZ = Math.sin(uData.orbitAngle) * uData.orbitRadius;
                    const orbitY = Math.sin(uData.orbitAngle * 2 + uData.bobOffset) * 1.2 + uData.orbitTilt * uData.orbitRadius * 0.3;

                    artifact.position.set(
                        starRef.position.x + orbitX,
                        starRef.position.y + orbitY,
                        starRef.position.z + orbitZ
                    );

                    artifact.lookAt(camera.position);
                }

                if (uData.core) {
                    uData.core.rotation.y += 0.02;
                    uData.core.rotation.x += 0.008;
                }

                if (uData.halo) {
                    const pulse = 0.35 + Math.sin(elapsedTime * 3 + uData.bobOffset) * 0.15;
                    uData.halo.material.opacity = pulse;
                    uData.halo.lookAt(camera.position);
                }

                if (uData.pulseScale && uData.pulseScale > 1) {
                    uData.pulseScale += (1 - uData.pulseScale) * 0.08;
                    artifact.children[0].scale.setScalar(uData.pulseScale);
                }
            });

            controls.update();
            composer.render();
        }

        function pulseArtifact(artifact) {
            const uData = artifact.userData;

        // Feature Extraction: Average center area and boost brightness
        function extractColor(imageElement) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100; // Resize for performance
            canvas.height = 100;

            ctx.drawImage(imageElement, 0, 0, 100, 100);

            try {
                // Sample center 50x50 area
                const imageData = ctx.getImageData(25, 25, 50, 50).data;
                let r = 0, g = 0, b = 0, count = 0;

                for (let i = 0; i < imageData.length; i += 4) {
                    r += imageData[i];
                    g += imageData[i + 1];
                    b += imageData[i + 2];
                    count++;
                }

                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                // Convert to HSL to boost Lightness (Make it GLOW)
                const rgbToHsl = (r, g, b) => {
                    r /= 255; g /= 255; b /= 255;
                    const max = Math.max(r, g, b), min = Math.min(r, g, b);
                    let h, s, l = (max + min) / 2;
                    if (max === min) h = s = 0;
                    else {
                        const d = max - min;
                        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                        switch (max) {
                            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                            case g: h = (b - r) / d + 2; break;
                            case b: h = (r - g) / d + 4; break;
                        }
                        h /= 6;
                    }
                    return [h, s, l];
                };

                let [h, s, l] = rgbToHsl(r, g, b);

                // FORCE Brightness & Saturation for Bloom effect
                // If it's too dark (black/grey), it becomes invisible in space at night
                if (l < 0.5) l = 0.6;
                if (s < 0.3) s = 0.8; // Boost saturation

                // Back to RGB (Simple CSS HSL string is easiest for Three.js Color constructor)
                // H is 0-1, convert to degrees. S/L are 0-1, convert to %
                return `hsl(${Math.floor(h * 360)}, ${Math.floor(s * 100)}%, ${Math.floor(l * 100)}%)`;

            } catch (e) {
                console.warn("Color extract failed, using fallback", e);
                return '#FFD700'; // Bright Gold
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "提取特征中...";

            const title = document.getElementById('event-title').value;
            const date = document.getElementById('event-date').value;
            const desc = document.getElementById('event-desc').value;
            const fileInput = document.getElementById('event-file');

            const artifactType = document.getElementById('selected-artifact-type').value;
            let artifactList = null;

            if (artifactType && ARTIFACT_TYPES[artifactType]) {
                const artifactPhotoInput = document.getElementById('artifact-photo');
                const artifactStory = document.getElementById('artifact-story').value.trim();
                const artifactLocation = document.getElementById('artifact-location').value.trim();

                let artifactPhotoSrc = null;
                if (artifactPhotoInput.files && artifactPhotoInput.files[0]) {
                    artifactPhotoSrc = URL.createObjectURL(artifactPhotoInput.files[0]);
                }

                artifactList = [{
                    type: artifactType,
                    photoSrc: artifactPhotoSrc,
                    story: artifactStory,
                    location: artifactLocation
                }];
            }

            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                const isVideo = file.type.startsWith('video');
                const mediaSrc = URL.createObjectURL(file);

                const data = {
                    title, date, desc,
                    mediaType: isVideo ? 'video' : 'image',
                    src: mediaSrc,
                    artifacts: artifactList
                };

                const finalizeAdd = (color) => {
                    addLifeEventToGalaxy(data, color, artifactList);
                    STATE.events.push(data);

                    modal.classList.remove('active');
                    btn.innerText = "注入银河";
                    form.reset();
                    selectedArtifactTypeInput.value = '';
                    artifactDetailFields.style.display = 'none';
                    artifactOptions.forEach(o => o.classList.remove('selected'));
                };

                if (isVideo) {
                    finalizeAdd(new THREE.Color('#00F0FF'));
                } else {
                    const img = new Image();
                    img.src = mediaSrc;
                    img.onload = () => {
                        const color = extractColor(img);
                        finalizeAdd(new THREE.Color(color));
                    };
                }
            }
        });

        function showEventCard(data) {
            const card = document.getElementById('event-card');
            const img = document.getElementById('card-img');
            const vid = document.getElementById('card-video');

            document.getElementById('card-title').innerText = data.title;
            document.getElementById('card-date').innerText = data.date;
            document.getElementById('card-desc').innerText = data.desc;

            if (data.mediaType === 'image') {
                img.src = data.src;
                img.style.display = 'block';
                vid.style.display = 'none';
                vid.pause();
                vid.src = "";
            } else {
                img.style.display = 'none';
                vid.src = data.src;
                vid.style.display = 'block';
                vid.load();
                vid.play().catch(e => console.warn("Auto-play blocked:", e));
            }

            const artifactSection = document.getElementById('card-artifacts');
            const artifactListEl = document.getElementById('card-artifact-list');
            artifactListEl.innerHTML = '';

            if (data.artifacts && data.artifacts.length > 0) {
                artifactSection.style.display = 'block';
                data.artifacts.forEach(art => {
                    const config = ARTIFACT_TYPES[art.type];
                    if (!config) return;
                    const chip = document.createElement('div');
                    chip.style.cssText = `
                        display: flex; align-items: center; gap: 0.35rem;
                        padding: 0.35rem 0.7rem; background: rgba(197, 160, 89, 0.15);
                        border: 1px solid rgba(197, 160, 89, 0.4); border-radius: 20px;
                        font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
                        -webkit-tap-highlight-color: transparent; min-height: 32px;
                    `;
                    chip.innerHTML = `<span style="font-size: 1rem;">${config.emoji}</span><span style="color: var(--text-light);">${config.name}</span>`;
                    chip.addEventListener('mouseenter', () => {
                        chip.style.background = 'rgba(197, 160, 89, 0.3)';
                        chip.style.transform = 'translateY(-1px)';
                    });
                    chip.addEventListener('mouseleave', () => {
                        chip.style.background = 'rgba(197, 160, 89, 0.15)';
                        chip.style.transform = 'translateY(0)';
                    });
                    chip.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        showArtifactModal(art, data);
                    });
                    artifactListEl.appendChild(chip);
                });
            } else {
                artifactSection.style.display = 'none';
            }

            card.classList.add('active');
        }

        function hideEventCard() {
            document.getElementById('event-card').classList.remove('active');
            const vid = document.getElementById('card-video');
            vid.pause();
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Expose APIs to global scope so UI can work even if module partially failed,
        // and so separate non-module scripts can call these functions.
        window.__LifeGalaxy = {
            THREE: THREE,
            addLifeEvent: addLifeEventToGalaxy,
            extractColor: extractColor,
            showArtifact: showArtifactModal,
            showEventCard: showEventCard,
            hideEventCard: hideEventCard,
            STATE: STATE,
            isReady: true
        };

        // Fire custom event to notify DOM scripts that 3D engine is ready
        document.dispatchEvent(new CustomEvent('galaxy-ready', {
            detail: { ok: true }
        }));

    </script>

    <script>
    (function() {
        // Pure DOM logic: works independently of Three.js loading
        document.addEventListener('DOMContentLoaded', init);
        // Also run init immediately in case DOMContentLoaded already fired
        if (document.readyState !== 'loading') init();

        // --- Global state for DOM layer ---
        let galaxyReady = false;
        let galaxyAPI = null;

        document.addEventListener('galaxy-ready', (e) => {
            galaxyReady = true;
            galaxyAPI = window.__LifeGalaxy;
        });

        // Fallback: if module script failed, still enable DOM interactions
        setTimeout(() => {
            if (!galaxyReady && window.__LifeGalaxy) {
                galaxyReady = true;
                galaxyAPI = window.__LifeGalaxy;
            }
        }, 1500);

        function init() {
            setupAddEventModal();
            setupArtifactSelector();
            setupArtifactModal();
            setupFormSubmit();
            setupArtifactModalShow();
        }

        function setupAddEventModal() {
            const addBtn = document.getElementById('add-event-btn');
            const modal = document.getElementById('add-modal');
            const closeModal = document.getElementById('close-modal');
            if (!addBtn || !modal) return;

            addBtn.addEventListener('click', () => {
                modal.classList.add('active');
            });
            closeModal.addEventListener('click', () => {
                modal.classList.remove('active');
            });
            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        }

        function setupArtifactSelector() {
            const artifactOptions = document.querySelectorAll('.artifact-option');
            const selectedArtifactTypeInput = document.getElementById('selected-artifact-type');
            const artifactDetailFields = document.getElementById('artifact-detail-fields');
            if (!artifactOptions.length) return;

            artifactOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const type = option.dataset.type;
                    const isSelected = option.classList.contains('selected');

                    artifactOptions.forEach(o => o.classList.remove('selected'));

                    if (isSelected) {
                        if (selectedArtifactTypeInput) selectedArtifactTypeInput.value = '';
                        if (artifactDetailFields) artifactDetailFields.style.display = 'none';
                    } else {
                        option.classList.add('selected');
                        if (selectedArtifactTypeInput) selectedArtifactTypeInput.value = type;
                        if (artifactDetailFields) artifactDetailFields.style.display = 'block';
                    }
                });
            });
        }

        // DOM-layer artifact modal functions (exposed globally for module script use)
        window.showArtifactModal = showArtifactModal;
        window.hideArtifactModal = hideArtifactModal;

        function setupArtifactModalShow() {
            // Expose to module scope
            if (typeof window !== 'undefined') {
                window.showArtifactModal = showArtifactModal;
                window.hideArtifactModal = hideArtifactModal;
            }
        }

        function showArtifactModal(artifactData, eventData) {
            const modal = document.getElementById('artifact-modal');
            if (!modal || !artifactData) return;

            const ARTIFACT_TYPES = {
                diploma: { name: '毕业证', emoji: '🎓', bgColor: '#C5A059' },
                ticket: { name: '老车票', emoji: '🎫', bgColor: '#D2691E' },
                key: { name: '钥匙', emoji: '🔑', bgColor: '#B8860B' },
                letter: { name: '手写信', emoji: '✉️', bgColor: '#F5F5DC' }
            };

            const config = ARTIFACT_TYPES[artifactData.type];
            if (!config) return;

            const iconEl = document.getElementById('artifact-detail-icon');
            if (iconEl) {
                iconEl.textContent = config.emoji;
                iconEl.style.background = `linear-gradient(135deg, ${config.bgColor}, #333)`;
            }

            const typeEl = document.getElementById('artifact-detail-type');
            if (typeEl) typeEl.textContent = config.name;

            const linkedEl = document.getElementById('artifact-detail-linked');
            if (linkedEl) linkedEl.textContent = `关联记忆：${eventData?.title || '未命名'}`;

            const photoEl = document.getElementById('artifact-detail-photo');
            if (photoEl) {
                if (artifactData.photoSrc) {
                    photoEl.src = artifactData.photoSrc;
                    photoEl.style.display = 'block';
                } else {
                    photoEl.style.display = 'none';
                    photoEl.removeAttribute('src');
                }
            }

            const storyEl = document.getElementById('artifact-detail-story');
            if (storyEl) storyEl.textContent = artifactData.story || '—';

            const locEl = document.getElementById('artifact-detail-location');
            if (locEl) locEl.textContent = artifactData.location || '—';

            modal.classList.add('active');
        }

        function hideArtifactModal() {
            const modal = document.getElementById('artifact-modal');
            if (modal) modal.classList.remove('active');
        }

        function setupArtifactModal() {
            const closeBtn = document.getElementById('close-artifact-modal');
            const modal = document.getElementById('artifact-modal');
            if (closeBtn) {
                closeBtn.addEventListener('click', hideArtifactModal);
            }
            window.addEventListener('click', (e) => {
                if (e.target === modal) hideArtifactModal();
            });
        }

        function setupFormSubmit() {
            const form = document.getElementById('event-form');
            if (!form) return;

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const btn = document.getElementById('submit-btn');
                const originalText = btn ? btn.innerText : '注入银河';
                if (btn) btn.innerText = '提取特征中...';

                const title = document.getElementById('event-title').value;
                const date = document.getElementById('event-date').value;
                const desc = document.getElementById('event-desc').value;
                const fileInput = document.getElementById('event-file');

                // Artifact data (works without Three.js)
                const artifactTypeEl = document.getElementById('selected-artifact-type');
                const artifactType = artifactTypeEl ? artifactTypeEl.value : '';
                let artifactList = null;

                const ARTIFACT_TYPES_KEYS = ['diploma', 'ticket', 'key', 'letter'];
                if (artifactType && ARTIFACT_TYPES_KEYS.indexOf(artifactType) !== -1) {
                    const artifactPhotoInput = document.getElementById('artifact-photo');
                    const artifactStory = (document.getElementById('artifact-story') || {}).value || '';
                    const artifactLocation = (document.getElementById('artifact-location') || {}).value || '';

                    let artifactPhotoSrc = null;
                    if (artifactPhotoInput && artifactPhotoInput.files && artifactPhotoInput.files[0]) {
                        artifactPhotoSrc = URL.createObjectURL(artifactPhotoInput.files[0]);
                    }

                    artifactList = [{
                        type: artifactType,
                        photoSrc: artifactPhotoSrc,
                        story: artifactStory.trim(),
                        location: artifactLocation.trim()
                    }];
                }

                const finalizeWithGalaxy = (colorObj) => {
                    const api = window.__LifeGalaxy;
                    if (!api || !api.addLifeEvent) {
                        // Graceful fallback: just close modal
                        console.warn('3D engine not ready, event stored in memory only');
                        cleanup();
                        return;
                    }
                    const data = {
                        title, date, desc,
                        mediaType: isVideo ? 'video' : 'image',
                        src: mediaSrc,
                        artifacts: artifactList
                    };
                    api.addLifeEvent(data, colorObj, artifactList);
                    if (api.STATE) api.STATE.events.push(data);
                    cleanup();
                };

                const cleanup = () => {
                    const modal = document.getElementById('add-modal');
                    if (modal) modal.classList.remove('active');
                    if (btn) btn.innerText = originalText;
                    form.reset();
                    const selInput = document.getElementById('selected-artifact-type');
                    if (selInput) selInput.value = '';
                    const fields = document.getElementById('artifact-detail-fields');
                    if (fields) fields.style.display = 'none';
                    document.querySelectorAll('.artifact-option').forEach(o => o.classList.remove('selected'));
                };

                if (fileInput && fileInput.files && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const isVideo = file.type.startsWith('video');
                    const mediaSrc = URL.createObjectURL(file);
                    window.__lastMedia = { isVideo, mediaSrc };

                    if (isVideo) {
                        const api = window.__LifeGalaxy;
                        const neonCyan = (api && api.THREE) ? new api.THREE.Color('#00F0FF') : '#00F0FF';
                        finalizeWithGalaxy(neonCyan);
                    } else {
                        const img = new Image();
                        img.onload = () => {
                            let color = '#FFD700';
                            const api = window.__LifeGalaxy;
                            if (api && api.extractColor) {
                                color = api.extractColor(img);
                            }
                            const colorObj = (api && api.THREE) ? new api.THREE.Color(color) : color;
                            finalizeWithGalaxy(colorObj);
                        };
                        img.onerror = () => {
                            const api = window.__LifeGalaxy;
                            const fallback = (api && api.THREE) ? new api.THREE.Color('#FFD700') : '#FFD700';
                            finalizeWithGalaxy(fallback);
                        };
                        img.src = mediaSrc;
                    }
                }
            });
        }

        // Also make showEventCard & hideEventCard work from DOM side
        const _origShowCard = window.showEventCard;

    })();
    </script>
